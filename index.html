<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="body">
        <div class="side-image">
            <img src="side image.avif">
        </div>
        <div class="container">
            <div class="header-part">
                <p class="top-text">This is not a real online service! You know you
                    need something like this in your life to help
                    you realize your deepest dreams.
                <p class="mid-text">Sign up now to get started.</p>
                <p class="bottom-text">You <em>know</em> you want to.</p>
                </p>
            </div>
            <div class="form-part">
                <form action="#" method="get">
                    <p class="top-text">Let's do this!</p>

                    <div class="horizontal-align">
                        <div>
                            <label for="first-name">FIRST NAME</label>
                            <input type="text" id="first-name">
                        </div>
                        <div>
                            <label for="last-name">LAST NAME</label>
                            <input type="text" id="last-name">
                        </div>
                    </div>
                    <div class="horizontal-align">
                        <div>
                            <label for="email">EMAIL</label>
                            <input type="email" id="email">
                        </div>
                        <div>
                            <label for="phone-no">PHONE NUMBER</label>
                            <input type="number" id="phone-no">
                        </div>
                    </div>
                    <div class="horizontal-align">
                        <div>
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password">
                        </div>

                        <div>
                            <label for="confirm-password">CONFIRM PASSWORD</label>
                            <input type="password" id="confirm-password">
                        </div>
                    </div>
                    <div class="button-part">
                        <button type="submit">Create Account</button>
                        <p>Already have an account?<a href="#"> Log in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
